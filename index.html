<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess the Word Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎮 Guess the Word</h1>
            <div class="score-board">
                <div class="score-item">
                    <span class="label">Score:</span>
                    <span id="score" class="value">0</span>
                </div>
                <div class="score-item">
                    <span class="label">Hints Left:</span>
                    <span id="hints-left" class="value">3</span>
                </div>
            </div>
        </header>

        <main>
            <div class="game-area">
                <div class="clue-section">
                    <h2>Clue:</h2>
                    <p id="clue" class="clue-text">Loading...</p>
                </div>

                <div class="word-display">
                    <div id="word-puzzle" class="puzzle"></div>
                </div>

                <div class="input-section">
                    <input 
                        type="text" 
                        id="guess-input" 
                        placeholder="Type your guess here..."
                        autocomplete="off"
                    >
                    <button id="submit-btn" class="btn btn-primary">Submit</button>
                </div>

                <div class="action-buttons">
                    <button id="hint-btn" class="btn btn-secondary">Get Hint (-3 pts)</button>
                    <button id="skip-btn" class="btn btn-warning">Skip Word (-3 pts)</button>
                </div>

                <div id="message" class="message"></div>
            </div>

            <div class="stats-section">
                <h3>Game Rules:</h3>
                <ul>
                    <li>✅ Correct answer: <strong>+10 points</strong></li>
                    <li>❌ Wrong answer: <strong>-1 point</strong></li>
                    <li>⏭️ Skip word: <strong>-3 points</strong></li>
                    <li>💡 Use hint: Reveals a letter (max 3 per word)</li>
                </ul>
            </div>
        </main>

        <footer>
            <button id="new-game-btn" class="btn btn-success">New Game</button>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
